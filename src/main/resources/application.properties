spring.application.name=proposta-app
spring.datasource.url=${CONEXAO_BANCO}
spring.datasource.username=${USERNAME_BANCO}
spring.datasource.password=${PASSWORD_BANCO}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${USERNAME_RABBITMQ}
spring.rabbitmq.password=${PASSWORD_RABBITMQ}

rabbitmq.propostapendente.exchange=proposta-pendente.ex
rabbitmq.propostaconcluida.exchange=proposta-concluida.ex
rabbitmq.propostapendente.ms-analise-credito=proposta-pendente.ms-analise-credito
rabbitmq.propostapendente.ms-notificacao=proposta-pendente.ms-notificacao
rabbitmq.propostaconcluida.ms-proposta=proposta-concluida.ms-proposta
rabbitmq.propostaconcluida.ms-notificacao=proposta-concluida.ms-notificacao

rabbitmq.queue.proposta.concluida=proposta-concluida.ms-proposta
